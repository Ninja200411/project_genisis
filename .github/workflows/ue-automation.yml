name: Unreal Automation

on:
  push:
    branches: [main]
  pull_request:

jobs:
  genesis-tests:
    name: Genesis build and automation tests
    runs-on: [self-hosted, Windows, X64, unreal-5.8]
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Validate golden save fixtures
        shell: powershell
        run: |
          $fixtures = Get-ChildItem .\TestData\GoldenSaves\*.golden.json -ErrorAction Stop
          if ($fixtures.Count -lt 1) { throw "No golden save fixtures found." }
          foreach ($fixture in $fixtures) { Get-Content $fixture.FullName -Raw | ConvertFrom-Json | Out-Null }

      - name: Build editor target
        shell: powershell
        run: .\Scripts\build\build-editor.ps1

      - name: Run Genesis automation tests
        shell: powershell
        run: .\Scripts\test\run-automation.ps1 -TestFilter "Genesis."

      - name: Upload automation and golden-save artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: genesis-automation-report
          path: |
            Saved/AutomationReports
            Saved/Logs/GenesisAutomation.log
            TestData/GoldenSaves
          if-no-files-found: warn
